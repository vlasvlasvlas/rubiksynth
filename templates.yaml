# ─── SOUND TEMPLATES ──────────────────────────────────────────────────────────

templates:

  # ── PADS ────────────────────────────────────────────────────────────────────

  - name: "Vangelis"
    config:
      synthType: "Synth"
      oscillatorType: "triangle"
      baseOctave: 4
      subdivision: "2n"
      scaleOverride: "pentatonic"
      attack: 0.8
      decay: 1.5
      sustain: 0.8
      release: 3.0
      cubeVolume: 0
      reverbWet: 0.85
      delayTime: "2n"
      delayFeedback: 0.4
      filterFreq: 1200
      panning: 0.0

  - name: "Theremin"
