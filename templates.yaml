# RubikSynth — Sound Templates
#
# Each template defines the full synthesis configuration for a cube.
# Apply any template from the cube inspector in the sidebar.
# Add your own by following the schema below.
#
# SYNTH TYPES
#   Synth       — simple oscillator (sine/triangle/square/sawtooth)
#   FMSynth     — frequency modulation, metallic/complex timbres
#   AMSynth     — amplitude modulation, tremolo-like timbres
#   MonoSynth   — monophonic with portamento, good for leads
#   PluckSynth  — Karplus-Strong string model (ignores ADSR)
#
# SUBDIVISION (note grid)
#   32n 16n 8n 4n 2n
#
# SCALE OVERRIDE (null = use global scale)
#   pentatonic major minor blues wholetone
#
# OSCILLATOR TYPES (Synth / MonoSynth only)
#   sine triangle square sawtooth

templates:

  # ── PADS ────────────────────────────────────────────────────────────────────

  - name: "Vangelis"
    config:
      synthType: "Synth"
      oscillatorType: "triangle"
      baseOctave: 4
      subdivision: "2n"
      scaleOverride: "pentatonic"
      attack: 0.8
      decay: 1.5
      sustain: 0.8
      release: 3.0
      cubeVolume: 0
      reverbWet: 0.85
      delayTime: "2n"
      delayFeedback: 0.4
      filterFreq: 1200
      panning: 0.0

  - name: "Theremin"
    config:
      synthType: "Synth"
      oscillatorType: "sine"
      baseOctave: 5
      subdivision: "4n"
      scaleOverride: null
      attack: 0.5
      decay: 0.2
      sustain: 1.0
      release: 1.5
      cubeVolume: -3
      reverbWet: 0.5
      delayTime: "8n"
      delayFeedback: 0.3
      filterFreq: 2000
      panning: 0.0

  - name: "Space Lady"
    config:
      synthType: "FMSynth"
      oscillatorType: "sine"
      baseOctave: 4
      subdivision: "4n"
      scaleOverride: "wholetone"
      attack: 0.1
      decay: 0.3
      sustain: 0.4
      release: 0.8
      cubeVolume: -2
      reverbWet: 0.6
      delayTime: "8n"
      delayFeedback: 0.5
      filterFreq: 2500
      modulationIndex: 8
      harmonicity: 2
      panning: 0.0

